name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint and Test
        run: pnpm turbo run test lint

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' # Error 1 Fix: Only run on push events
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [server, client, microfrontend-one, layout]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Error 2 Fix: Fetch all history for Turborepo

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if change happened
        id: check
        run: |
          # Note the change from origin/main to main
          if pnpm turbo run build --filter=${{ matrix.app }}...[HEAD^1] --dry=json | grep -q '"tasks": \[\]'; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      # Error 3 Fix: Add step to lowercase the owner name
      - name: Lowercase repository owner
        id: lowercase_owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # Use the lowercased owner name from the previous step
          docker build . -f packages/${{ matrix.app }}/Dockerfile -t ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.app }}:latest -t ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.app }}:${{ github.sha }}
          docker push ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.app }}:latest
          docker push ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.app }}:${{ github.sha }}
